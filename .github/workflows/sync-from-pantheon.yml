name: Sync from Pantheon

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync-from-pantheon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 codeserver.dev.bbf3c8c9-0d03-4b52-a521-0898f33b78ae.drush.in >> ~/.ssh/known_hosts

      - name: Add Pantheon remote and fetch
        run: |
          git remote add pantheon ssh://codeserver.dev.bbf3c8c9-0d03-4b52-a521-0898f33b78ae@codeserver.dev.bbf3c8c9-0d03-4b52-a521-0898f33b78ae.drush.in:2222/~/repository.git
          git fetch pantheon master --depth=1

      - name: Check for changes
        id: diff
        run: |
          CHANGED=$(git diff HEAD pantheon/master -- composer.json composer.lock)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No hay cambios. Nada que hacer."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Cambios detectados. Creando PR."
          fi

      - name: Create branch with changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="autopilot/pantheon-sync-$(date +%Y%m%d-%H%M)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git config user.email "bot@github-actions.com"
          git config user.name "Pantheon Sync Bot"
          git checkout -b $BRANCH
          git checkout pantheon/master -- composer.json composer.lock
          git add composer.json composer.lock
          git commit -m "chore: sync composer updates from Pantheon ($(date +%Y-%m-%d))"
          git push origin $BRANCH

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        run: |
          curl --request POST \
            --header "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{
              \"title\": \"🤖 Pantheon sync: composer updates $(date +%Y-%m-%d)\",
              \"body\": \"Sync automático de actualizaciones desde Pantheon Autopilot.\n\nRevisar composer.json y composer.lock antes de mergear.\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }" \
            "https://api.github.com/repos/CGMDEV91/test-drupal-github-ci-pipeline/pulls"
